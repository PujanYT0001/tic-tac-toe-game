<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-blue">

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen active">
        <div class="loader" id="loader-animation">
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
        </div>
        <h1 class="neon-text flicker" id="loading-text">LOADING...</h1>
        <h2 class="neon-text flicker hidden" id="start-prompt" style="margin-top: 2rem; font-size: 1.5rem; letter-spacing: 4px; cursor: pointer;">PRESS ENTER TO START</h2>
    </div>

    <!-- Background Particles Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Menu Screen -->
    <div id="main-menu" class="screen">
        <h1 id="main-title" class="title neon-text" style="cursor: pointer; transition: transform 0.1s;">TIC TAC TOE</h1>
        <div class="menu-card glass">
            <button class="btn btn-primary ripple" id="btn-pvp">Player vs Player</button>
            <button class="btn btn-primary ripple" id="btn-pva">Player vs AI</button>
            
            <div id="ai-difficulty-selector" class="hidden">
                <p>Select Difficulty:</p>
                <div class="difficulty-buttons">
                    <button class="btn btn-secondary ripple" id="btn-ai-easy">Easy</button>
                    <button class="btn btn-secondary ripple" id="btn-ai-hard">Hard (Minimax)</button>
                </div>
            </div>

            <div class="menu-footer">
                <button class="btn btn-icon ripple" id="btn-stats" title="Statistics">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                </button>
                <button class="btn btn-icon ripple" id="btn-settings" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="top-bar glass">
            <button class="btn btn-icon ripple" id="btn-back" title="Back to Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div id="turn-indicator" class="turn-indicator">
                <span class="indicator-text">Player X's Turn</span>
                <div class="indicator-bar"></div>
            </div>
            <button class="btn btn-icon ripple" id="btn-undo" title="Undo Move">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path></svg>
            </button>
        </div>

        <div class="scoreboard glass">
            <div class="score-box" id="score-x-box">
                <span class="player-label">Player X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-box" id="score-draw-box">
                <span class="player-label">Draws</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score-box" id="score-o-box">
                <span class="player-label" id="label-o">Player O</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>

        <div class="game-board-container">
            <div class="board glass" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
                <!-- Winning Line -->
                <div class="winning-line" id="winning-line"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn btn-secondary ripple" id="btn-restart">Restart Match</button>
        </div>
    </div>

    <!-- Modals (Settings, Stats, Game Over) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        
        <!-- Game Over Modal -->
        <div id="modal-gameover" class="modal glass hidden">
            <h2 id="winner-text" class="neon-text">Player X Wins!</h2>
            <div class="modal-buttons">
                <button class="btn btn-primary ripple" id="btn-play-again">Play Again</button>
                <button class="btn btn-secondary ripple" id="btn-menu-from-gameover">Main Menu</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="modal-settings" class="modal glass hidden">
            <h2 class="neon-text">Settings</h2>
            <div class="settings-group">
                <label>Theme</label>
                <div class="theme-options">
                    <button class="theme-btn active" data-theme="theme-blue" style="--theme-color: #00f3ff;"></button>
                    <button class="theme-btn" data-theme="theme-purple" style="--theme-color: #b829ff;"></button>
                    <button class="theme-btn" data-theme="theme-green" style="--theme-color: #00ff66;"></button>
                </div>
            </div>
            <div class="settings-group">
                <label>Sound Effects</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-sfx" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn btn-primary ripple" id="btn-close-settings">Close</button>
        </div>

        <!-- Stats Modal -->
        <div id="modal-stats" class="modal glass hidden">
            <h2 class="neon-text">Statistics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Total Matches</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Wins (X)</span>
                    <span class="stat-value" id="stat-wins">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Losses (O)</span>
                    <span class="stat-value" id="stat-losses">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Draws</span>
                    <span class="stat-value" id="stat-draws">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Win %</span>
                    <span class="stat-value" id="stat-winrate">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Current Streak</span>
                    <span class="stat-value" id="stat-streak">0</span>
                </div>
            </div>
            <button class="btn btn-secondary ripple mt-1" id="btn-reset-stats">Reset Stats</button>
            <button class="btn btn-primary ripple mt-1" id="btn-close-stats">Close</button>
        </div>

        <!-- Name Input Modal -->
        <div id="modal-names" class="modal glass hidden">
            <h2 class="neon-text">Enter Names</h2>
            <div class="settings-group" style="flex-direction: column; align-items: flex-start; border: none; padding-bottom: 0;">
                <label for="input-player-x">Player X (First Turn):</label>
                <input type="text" id="input-player-x" class="neon-input" placeholder="Player X" value="Player X">
            </div>
            <div class="settings-group" id="group-player-o" style="flex-direction: column; align-items: flex-start; border: none;">
                <label for="input-player-o">Player O:</label>
                <input type="text" id="input-player-o" class="neon-input" placeholder="Player O" value="Player O">
            </div>
            <div class="modal-buttons" style="margin-top: 15px;">
                <button class="btn btn-primary ripple" id="btn-start-game">Start</button>
                <button class="btn btn-secondary ripple" id="btn-cancel-names">Cancel</button>
            </div>
        </div>

    </div>

    <!-- Audio Elements -->
    <audio id="sfx-click" src="assets/sounds/click.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="assets/sounds/win.mp3" preload="auto"></audio>
    <audio id="sfx-draw" src="assets/sounds/draw.mp3" preload="auto"></audio>
    <audio id="sfx-hover" src="assets/sounds/hover.mp3" preload="auto"></audio>
    <!-- We can add background music later if desired -->

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
